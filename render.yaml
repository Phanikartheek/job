services:
  - type: web
    name: jobguard-api
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r flask_backend/requirements.txt"
    startCommand: "gunicorn --chdir flask_backend app_enhanced:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: ENV
        value: production

